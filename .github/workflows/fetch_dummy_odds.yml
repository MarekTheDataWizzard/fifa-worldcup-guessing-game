name: Fetch dummy odds

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  fetch-dummy-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Insert dummy odds into database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/fetch_dummy_odds.py